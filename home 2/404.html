<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Connection Lost | NetSol V2</title>
    <link rel="stylesheet" href="./root.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
     
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main), sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .error-container {
            padding: 20px;
            max-width: 600px;
            z-index: 2;
        }

        /* --- Animated 404 Text --- */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -5px;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px var(--primary-glow);
            animation: float 4s ease-in-out infinite;
        }

        .error-code::before {
            content: "404";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: white;
            opacity: 0.3;
            animation: glitch 2s infinite;
        }

        /* --- Content Styling --- */
        h2 {
            font-size: 2rem;
            margin: 20px 0 10px;
            text-transform: uppercase;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* --- Neon Button --- */
        .btn-neon {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--grad-linear);
            color: #000;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 0 20px var(--primary-glow);
            transition: 0.3s ease;
        }

        .btn-neon:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px var(--primary-glow);
            filter: brightness(1.2);
        }

        /* --- Background Animation Decor --- */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(222, 255, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(222, 255, 0, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            bottom: -50%;
            z-index: 1;
            animation: moveGrid 10s linear infinite;
        }

        /* --- Keyframes --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glitch {
            0% { clip-path: inset(10% 0 30% 0); transform: translate(-5px, -5px); }
            20% { clip-path: inset(50% 0 10% 0); transform: translate(5px, 5px); }
            40% { clip-path: inset(20% 0 60% 0); transform: translate(-5px, 5px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(5px, -5px); }
            80% { clip-path: inset(40% 0 40% 0); transform: translate(-5px, 0); }
            100% { clip-path: inset(10% 0 30% 0); transform: translate(5px, 5px); }
        }

        @keyframes moveGrid {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        /* --- Responsive 768px Media Query --- */
        @media screen and (min-width: 768px) {
            .error-code { font-size: 12rem; }
            h2 { font-size: 3rem; }
            p { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="error-container">
        <div class="glitch-wrapper">
            <h1 class="error-code">404</h1>
        </div>
        <h2>Connection Lost</h2>
        <p>The signal you are looking for has been dropped or moved to a different frequency. Let's get you back online.</p>
        
        <a href="index.html" class="btn-neon">
            <i class="fa-solid fa-house"></i> Return Home
        </a>
    </div>

</body>
</html>
