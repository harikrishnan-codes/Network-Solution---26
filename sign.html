<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NetSolve</title>
    <link rel="icon" href="./assets/bg remove.webp">
    <link rel="stylesheet" href="./sign.css">
    <link rel="stylesheet" href="./root.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <!-- Background Effects -->
        <div class="bg-effects">
            <div class="effect-orb orb-1"></div>
            <div class="effect-orb orb-2"></div>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to manage your account</p>
                </div>

                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    <span class="error-message" id="loginEmailError"></span>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper"><input type="checkbox" id="rememberMe"><span class="checkmark"></span>Remember me</label><a href="forgot.html" class="link-btn">Forgot Password?</a></div>

                <button type="submit" class="btn-submit">Sign In</button>

                <div class="form-footer"><p>Don't have an account? <a href="signup.html" class="link-btn">Sign Up</a></p></div>
            </form>
        </div>

        <!-- Back to Home -->
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>

    <script src="./script.js"></script>
    <script>
        // Password Toggle
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Validation Functions
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function showError(inputId, message) {
            const inputGroup = document.getElementById(inputId).closest('.input-group');
            const errorSpan = document.getElementById(inputId + 'Error');
            inputGroup.classList.add('error');
            errorSpan.textContent = message;
        }

        function clearError(inputId) {
            const inputGroup = document.getElementById(inputId).closest('.input-group');
            const errorSpan = document.getElementById(inputId + 'Error');
            inputGroup.classList.remove('error');
            errorSpan.textContent = '';
        }

        // Login Form
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email) {
                showError('loginEmail', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('loginEmail', 'Please enter a valid email');
                isValid = false;
            } else {
                clearError('loginEmail');
            }

            if (!password) {
                showError('loginPassword', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showError('loginPassword', 'Password must be at least 6 characters');
                isValid = false;
            } else {
                clearError('loginPassword');
            }

            if (isValid) {
                window.location.href = '404.html';
            }
        });

        // Input focus effects
        document.querySelectorAll('.input-wrapper input').forEach(input => {
            input.addEventListener('focus', function() {
                this.closest('.input-wrapper').classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.closest('.input-wrapper').classList.remove('focused');
            });
        });
    </script>
</body>
</html>
