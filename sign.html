<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NetSolve</title>
    <link rel="icon" href="./assets/bg remove.webp">
    <link rel="stylesheet" href="./sign.css">
    <link rel="stylesheet" href="./root.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="auth-container">
        <div class="bg-effects">
            <div class="effect-orb orb-1"></div>
            <div class="effect-orb orb-2"></div>
        </div>

        <div class="auth-card">
            <div class="auth-tabs" data-aos="fade-up"
>
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form class="auth-form active" id="loginForm" data-aos="fade-down">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to manage your account</p>
                </div>

                <div class="input-group">
                    <label for="loginEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    <span class="error-message" id="loginEmailError"></span>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="loginPasswordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper"><input type="checkbox" id="rememberMe"><span
                            class="checkmark"></span>Remember me</label>
                    <a href="#" class="link-btn" onclick="switchTab('forgot'); return false;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" class="link-btn"
                            onclick="switchTab('signup'); return false;">Sign Up</a></p>
                </div>
            </form>

            <!-- Signup Form -->
            <form class="auth-form" id="signupForm" data-aos="slide-up">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Join millions of users worldwide</p>
                </div>

                <div class="input-group">
                    <label for="signupName">Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signupName" placeholder="Enter your full name" required>
                    </div>
                    <span class="error-message" id="signupNameError"></span>
                </div>

                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                    <span class="error-message" id="signupEmailError"></span>
                </div>

                <div class="input-group">
                    <label for="signupPhone">Phone Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="signupPhone" placeholder="Enter your phone number" required>
                    </div>
                    <span class="error-message" id="signupPhoneError"></span>
                </div>

                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Create a password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="signupPasswordError"></span>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <span class="strength-text"></span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <div class="input-wrapper password-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password"
                            onclick="togglePassword('signupConfirmPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="signupConfirmPasswordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="agreeTerms" required>
                        <span class="checkmark"></span>
                        I agree to the <a href="#" class="link-text">Terms</a> and <a href="#" class="link-text">Privacy
                            Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>

                <div class="form-footer">
                    <p>Already have an account? <a href="#" class="link-btn"
                            onclick="switchTab('login'); return false;">Sign In</a></p>
                </div>
            </form>

            <!-- Forgot Password Form -->
            <form class="auth-form" id="forgotForm" data-aos="slide-down">
                <div class="form-header">
                    <div class="forgot-icon">
                        <i class="fas fa-key"></i>
                    </div>
                    <h2>Reset Password</h2>
                    <p>Enter your email to receive reset instructions</p>
                </div>

                <div class="input-group">
                    <label for="forgotEmail">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
                    </div>
                    <span class="error-message" id="forgotEmailError"></span>
                </div>

                <button type="submit" class="btn-submit">Send Reset Link</button>

                <div class="form-footer">
                    <p><a href="#" class="link-btn" onclick="switchTab('login'); return false;"><i
                                class="fas fa-arrow-left"></i> Back to Login</a></p>
                </div>
            </form>
        </div>

        <!-- Back to Home -->
        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> Back to Home
        </a>
    </div>

    <script>
        // Tab Switching Function
        function switchTab(tab) {
            // Hide all forms
            document.querySelectorAll('.auth-form').forEach(form => {
                form.classList.remove('active');
            });

            // Remove active class from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected form
            document.getElementById(tab + 'Form').classList.add('active');

            // Add active class to clicked tab (for login and signup)
            if (tab === 'login' || tab === 'signup') {
                const tabIndex = tab === 'login' ? 0 : 1;
                document.querySelectorAll('.tab-btn')[tabIndex].classList.add('active');
            }

            // Clear any validation errors
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            document.querySelectorAll('.input-group').forEach(el => el.classList.remove('error'));
        }

        // Password Toggle
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');

            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Validation Functions
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validatePhone(phone) {
            const re = /^[0-9]{10,15}$/;
            return re.test(phone.replace(/\D/g, ''));
        }

        function showError(inputId, message) {
            const inputGroup = document.getElementById(inputId).closest('.input-group');
            const errorSpan = document.getElementById(inputId + 'Error');
            inputGroup.classList.add('error');
            errorSpan.textContent = message;
        }

        function clearError(inputId) {
            const inputGroup = document.getElementById(inputId).closest('.input-group');
            const errorSpan = document.getElementById(inputId + 'Error');
            inputGroup.classList.remove('error');
            errorSpan.textContent = '';
        }

        // ==================== LOGIN FORM ====================
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let isValid = true;

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email) {
                showError('loginEmail', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('loginEmail', 'Please enter a valid email');
                isValid = false;
            } else {
                clearError('loginEmail');
            }

            if (!password) {
                showError('loginPassword', 'Password is required');
                isValid = false;
            } else if (password.length < 6) {
                showError('loginPassword', 'Password must be at least 6 characters');
                isValid = false;
            } else {
                clearError('loginPassword');
            }

            if (isValid) {
                window.location.href = '404.html';
            }
        });

        // ==================== SIGNUP FORM ====================
        // Password Strength Indicator
        const signupPassword = document.getElementById('signupPassword');
        const strengthBar = document.querySelector('.strength-fill');
        const strengthText = document.querySelector('.strength-text');

        if (signupPassword) {
            signupPassword.addEventListener('input', function () {
                const password = this.value;
                const strength = calculatePasswordStrength(password);
                updateStrengthIndicator(strength);
            });
        }

        function calculatePasswordStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength += 25;
            if (password.match(/[a-z]/)) strength += 25;
            if (password.match(/[A-Z]/)) strength += 25;
            if (password.match(/[0-9]/) || password.match(/[^a-zA-Z0-9]/)) strength += 25;
            return strength;
        }

        function updateStrengthIndicator(strength) {
            strengthBar.style.width = strength + '%';

            if (strength <= 25) {
                strengthBar.style.backgroundColor = '#EF4444';
                strengthText.textContent = 'Weak';
                strengthText.style.color = '#EF4444';
            } else if (strength <= 50) {
                strengthBar.style.backgroundColor = '#F59E0B';
                strengthText.textContent = 'Fair';
                strengthText.style.color = '#F59E0B';
            } else if (strength <= 75) {
                strengthBar.style.backgroundColor = '#3B82F6';
                strengthText.textContent = 'Good';
                strengthText.style.color = '#3B82F6';
            } else {
                strengthBar.style.backgroundColor = '#10B981';
                strengthText.textContent = 'Strong';
                strengthText.style.color = '#10B981';
            }

            if (signupPassword.value.length === 0) {
                strengthBar.style.width = '0';
                strengthText.textContent = '';
            }
        }

        document.getElementById('signupForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let isValid = true;

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('signupPhone').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            if (!name.trim()) {
                showError('signupName', 'Name is required');
                isValid = false;
            } else if (name.trim().length < 2) {
                showError('signupName', 'Name must be at least 2 characters');
                isValid = false;
            } else {
                clearError('signupName');
            }

            if (!email) {
                showError('signupEmail', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('signupEmail', 'Please enter a valid email');
                isValid = false;
            } else {
                clearError('signupEmail');
            }

            if (!phone) {
                showError('signupPhone', 'Phone number is required');
                isValid = false;
            } else if (!validatePhone(phone)) {
                showError('signupPhone', 'Please enter a valid phone number');
                isValid = false;
            } else {
                clearError('signupPhone');
            }

            if (!password) {
                showError('signupPassword', 'Password is required');
                isValid = false;
            } else if (password.length < 8) {
                showError('signupPassword', 'Password must be at least 8 characters');
                isValid = false;
            } else {
                clearError('signupPassword');
            }

            if (!confirmPassword) {
                showError('signupConfirmPassword', 'Please confirm your password');
                isValid = false;
            } else if (password !== confirmPassword) {
                showError('signupConfirmPassword', 'Passwords do not match');
                isValid = false;
            } else {
                clearError('signupConfirmPassword');
            }

            if (!agreeTerms) {
                alert('Please agree to the Terms and Privacy Policy');
                isValid = false;
            }

            if (isValid) {
                window.location.href = '404.html';
            }
        });

        // ==================== FORGOT PASSWORD FORM ====================
        document.getElementById('forgotForm').addEventListener('submit', function (e) {
            e.preventDefault();
            let isValid = true;

            const email = document.getElementById('forgotEmail').value;

            if (!email) {
                showError('forgotEmail', 'Email is required');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('forgotEmail', 'Please enter a valid email');
                isValid = false;
            } else {
                clearError('forgotEmail');
            }

            if (isValid) {
                // Show success message and redirect to 404 page
                alert('Password reset link has been sent to your email!');

                // Clear the forgot password form
                document.getElementById('forgotEmail').value = '';

                // Redirect to 404.html
                window.location.href = '404.html';
            }
        });

        // ==================== INPUT FOCUS EFFECTS ====================
        document.querySelectorAll('.input-wrapper input').forEach(input => {
            input.addEventListener('focus', function () {
                this.closest('.input-wrapper').classList.add('focused');
            });

            input.addEventListener('blur', function () {
                this.closest('.input-wrapper').classList.remove('focused');
            });
        });
    </script>
</body>

</html>
